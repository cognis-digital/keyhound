apiVersion: apps/v1
kind: Deployment
metadata: { name: keyhound, labels: { app: keyhound } }
spec:
  replicas: 1
  selector: { matchLabels: { app: keyhound } }
  template:
    metadata: { labels: { app: keyhound } }
    spec:
      containers:
        - name: keyhound
          image: ghcr.io/cognis-digital/keyhound:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: keyhound }
spec:
  selector: { app: keyhound }
  ports: [{ port: 80, targetPort: 8000 }]
